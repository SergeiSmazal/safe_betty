<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Help Betty 🐾</title>
    <link rel="stylesheet" href="assets/css/base.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo" data-i18n="title">Help Betty 🐾</div>
            <div class="nav-links">
                <a href="https://www.instagram.com/bettyhomecat?igsh=MTVza3EyYjl5bGptNA==" target="_blank" class="nav-link">Instagram</a>
                <div class="lang-switcher">
                    <button onclick="i18n.load('de')">DE</button>
                    <button onclick="i18n.load('en')">EN</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero">
            <div class="hero-content" style="text-align: center;">
                <h1 data-i18n="hero_title" class="hero-headline"></h1>
                <p data-i18n="hero_text" class="hero-subtext"></p>
            </div>
            <div class="hero-image">
                <img src="assets/img/betty-2.jpg" alt="Betty" />
            </div>
        </section>

        <section id="story" class="story">
            <div class="story-content">
                <h2 data-i18n="story_title"></h2>
                <p data-i18n="story_text_1"></p>
                <p data-i18n="story_text_2"></p>
                <p data-i18n="story_text_3"></p>
                <p data-i18n="story_text_4"></p>
                <p data-i18n="story_text_5"></p>
                <p data-i18n="story_text_6"></p>
            </div>
        </section>

        <section id="donate" class="donate">
            <h2 data-i18n="donate_title">Donations</h2>
            <div class="progress-container">
                <div class="progress-labels">
                    <span id="progress-collected"></span>
                    <span id="progress-goal"></span>
                </div>
                <div class="progress-bar">
                    <div class="progress-bar-fill"></div>
                </div>
            </div>
            <a href="https://gofund.me/d271bda22" target="_blank" class="btn-primary" data-i18n="donate_btn">Donate now</a>
        </section>

        <section id="gallery" class="gallery">
            <h2 data-i18n="gallery_title" style="text-align: center; width: 100%;">Gallery</h2>
            <img src="assets/img/betty-1.jpg" alt="Betty 1" class="photo-card" />
            <img src="assets/img/betty-2.jpg" alt="Betty 2" class="photo-card" />
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Sergei Smazal</p>
    </footer>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/donations.js"></script>
    <script src="assets/js/animations.js"></script>
</body>
</html>
