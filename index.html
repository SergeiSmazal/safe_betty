<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Help Betty 🐾</title>
    <link rel="stylesheet" href="assets/css/base.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo" data-i18n="title">Help Betty 🐾</div>
            <div class="lang-switcher">
                <button onclick="i18n.load('de')">DE</button>
                <button onclick="i18n.load('en')">EN</button>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero">
            <div class="hero-content">
                <h1 data-i18n="hero_title" class="hero-headline">Betty needs help</h1>
                <p data-i18n="hero_text" class="hero-subtext">Betty needs your help.</p>
                <button data-i18n="donate_btn" class="btn-primary hero-cta">Donate now</button>
            </div>
            <div class="hero-image">
                <!-- Place holder for Betty's photo -->
                <img src="assets/img/betty2.jpg" alt="Betty" />
            </div>
        </section>

        <section id="story" class="story">
            <div class="story-content">
                <h2 data-i18n="story_title">Our Story</h2>
                <p data-i18n="story_text_1">Betty's story...</p>
                <p data-i18n="story_text_2">FORL details...</p>
            </div>
        </section>

        <section id="donate">
            <h2 data-i18n="donate_title">Donations</h2>
            <!-- Progress bar will be inserted here -->
            <div class="progress-bar">
                <div class="progress-bar-fill"></div>
            </div>
        </section>

        <section id="gallery">
            <h2 data-i18n="gallery_title">Gallery</h2>
            <!-- Images will be inserted here -->
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Sergei Smazal</p>
    </footer>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/donations.js"></script>
    <script src="assets/js/animations.js"></script>
</body>
</html>
